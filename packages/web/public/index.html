<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Remarkable Maze Generator</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="page">
      <h1>Remarkable Maze Generator</h1>

      <div class="card">
        <form id="maze-form">
          <div class="form-fields">
            <label class="field">
              Width
              <input type="number" id="width" name="width" value="10" min="1" step="1" required />
            </label>
            <label class="field">
              Height
              <input type="number" id="height" name="height" value="10" min="1" step="1" required />
            </label>
            <label class="field">
              Difficulty (1-5)
              <input type="number" id="difficulty" name="difficulty" value="1" min="1" max="5" step="1" required />
            </label>
            <label class="field">
              Maze type
              <select id="maze-type" name="maze-type">
                <option value="rectangle">Rectangle</option>
                <option value="rectangle-crossing">Rectangle crossing</option>
                <option value="circle">Circle</option>
              </select>
            </label>
            <label class="field">
              Generation algorithm
              <select id="maze-algorithm" name="maze-algorithm">
                <option value="growing-tree">Growing tree</option>
                <option value="kruskal">Kruskal</option>
                <option value="wilson">Wilson</option>
                <option value="aldous-broder">Aldous-Broder</option>
              </select>
            </label>
            <label class="field">
              Solution in PDF
              <select id="solution-mode" name="solution-mode">
                <option value="none">None</option>
                <option value="extra-page">Extra page</option>
                <option value="overlay">Overlay</option>
              </select>
            </label>
          </div>
          <label class="field-checkbox">
            <input type="checkbox" id="show-solution" name="show-solution" />
            Show solution on preview
          </label>
          <button type="submit" class="button">Generate</button>
        </form>

        <p id="form-error" role="alert"></p>
      </div>

      <div class="card preview-card">
        <img id="maze-preview" alt="Generated maze preview" style="display: none;" />
        <p id="maze-seed"></p>
        <p id="solution-branch-count"></p>

        <div class="actions">
          <a id="download-link" class="button" href="#" download="maze.pdf" style="display: none;">Download PDF</a>
          <label class="field" id="remarkable-folder-field" style="display: none;">
            reMarkable folder (optional)
            <input type="text" id="remarkable-folder" name="remarkable-folder" placeholder="Root" />
          </label>
          <button id="send-button" class="button" type="button" style="display: none;">Send to reMarkable</button>
        </div>

        <p id="send-status" role="status"></p>

        <div id="pairing-section" style="display: none;">
          <p>
            Not connected to reMarkable yet. Get a one-time pairing code at
            <a href="https://my.remarkable.com/device/browser/connect" target="_blank" rel="noopener">my.remarkable.com/device/browser/connect</a>.
          </p>
          <label class="field">
            Pairing code
            <input type="text" id="pairing-code" name="pairing-code" />
          </label>
          <button id="pairing-submit" class="button" type="button">Pair device</button>
          <p id="pairing-error" role="alert"></p>
        </div>
      </div>
    </div>

    <script type="module" src="./app.js"></script>
  </body>
</html>
