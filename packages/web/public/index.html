<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Remarkable Maze Generator</title>
  </head>
  <body>
    <h1>Remarkable Maze Generator</h1>

    <form id="maze-form">
      <label>
        Width
        <input type="number" id="width" name="width" value="10" min="1" step="1" required />
      </label>
      <label>
        Height
        <input type="number" id="height" name="height" value="10" min="1" step="1" required />
      </label>
      <label>
        Difficulty (1-5)
        <input type="number" id="difficulty" name="difficulty" value="1" min="1" max="5" step="1" required />
      </label>
      <button type="submit">Generate</button>
    </form>

    <p id="form-error" role="alert"></p>

    <iframe id="maze-preview" title="Maze preview" style="display: none; width: 100%; height: 600px; border: 1px solid #ccc;"></iframe>

    <script type="module" src="./app.js"></script>
  </body>
</html>
